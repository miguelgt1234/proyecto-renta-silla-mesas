<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="registro.css">
    <title>Registro</title>
</head>

<body>

    <header>
        <h1>Registro de Usuario</h1>
    </header>

    <main id="tarjeta-registro">
    <header>
        <i class="fas fa-user-plus logo-icon"></i>
        <h1>Registro de Cliente</h1>
    </header>

    <form method="post">
        <div class="row">
            <div class="input-group">
                <label for="nombre">Nombres</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="nombre" id="nombre" placeholder="Nombres" required>
                </div>
            </div>
            <div class="input-group">
                <label for="apellidoPaterno">Apellido Paterno</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" name="apellidoPaterno" id="apellidoPaterno" placeholder="Paterno" required>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="apellidoMaterno">Apellido Materno</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" name="apellidoMaterno" id="apellidoMaterno" placeholder="Materno" required>
                </div>
            </div>
            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone"></i>
                    <input type="tel" name="telefono" id="telefono" placeholder="5512345678" required>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="correo" id="correo" placeholder="correo@ejemplo.com" required>
                </div>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="********" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-registro">Registrarse</button>

        <p class="login-link">¿Ya tienes cuenta? <a href="inicio_de_sesion.html">Inicia sesión</a></p>
    </form>
</main>

</body>

</html>
