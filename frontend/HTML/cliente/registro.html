<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body>

    <div id="contenedorRegistro">

        <div id="headerRegistro">
            <h1 id="tituloRegistro">Registro de Usuario</h1>
        </div>

        <form id="formRegistro">

            <div id="nombreRegistroContainer">
                <label id="labelNombreRegistro">Nombre:</label>
                <input id="inputNombreRegistro" type="text">
            </div>

            <div id="correoRegistroContainer">
                <label id="labelCorreoRegistro">Correo:</label>
                <input id="inputCorreoRegistro" type="email">
            </div>

            <div id="telefonoRegistroContainer">
                <label id="labelTelefonoRegistro">Teléfono:</label>
                <input id="inputTelefonoRegistro" type="text">
            </div>

            <div id="passwordRegistroContainer">
                <label id="labelPasswordRegistro">Contraseña:</label>
                <input id="inputPasswordRegistro" type="password">
            </div>

            <div id="accionesRegistro">
                <button id="btnRegistrar">Registrarse</button>
            </div>

        </form>

    </div>

</body>
</html>
